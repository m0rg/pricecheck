name: Package Extension

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  zip-lua-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare pricechecker directory
        run: |
          mkdir pricechecker
          cp *.lua pricechecker/

      - name: Zip pricechecker directory
        run: |
          zip -r pricechecker.zip pricechecker

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pricechecker-zip
          path: pricechecker.zip
