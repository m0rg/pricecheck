name: Publish to RedGuides

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 0


      - name: Build zip file
        run: git archive --format=zip -o "${{ github.event.repository.name }}_${{ github.ref_name }}.zip" HEAD

      - name: Create message from git log
        env:
          VERSION: "${{ github.ref_name }}"
        run: |
          PREV=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || echo "")
          git log --no-merges --pretty=format:"- %s ([%h](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/%H))" ${PREV:+$PREV..}${VERSION} > rg_release_notes.md

      - name: Publish to RedGuides
        uses: RedGuides/redguides-publish@v1
        env:
          REDGUIDES_API_KEY: ${{ secrets.REDGUIDES_API_KEY }}
        with:
          resource_id: "3332"
          version: "${{ github.ref_name }}"
          file: "${{ github.event.repository.name }}_${{ github.ref_name }}.zip"
          message: "rg_release_notes.md"
          domain: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.repository.default_branch }}/"
