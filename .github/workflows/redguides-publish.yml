name: Publish to RedGuides

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare pricecheck directory
        run: |
          mkdir pricecheck
          cp *.lua pricecheck/
          cp -r modules pricecheck/
          cp README.md pricecheck/

      - name: Zip pricecheck directory
        run: |
          zip -r pricecheck.zip pricecheck

      - name: Publish to RedGuides
        uses: RedGuides/redguides-publish@v1
        env:
          REDGUIDES_API_KEY: ${{ secrets.REDGUIDES_API_KEY }}
        with:
          resource_id: ${{ secrets.REDGUIDES_RESOURCE_ID }}
          description: 'README.md'
          file: 'pricecheck.zip'
